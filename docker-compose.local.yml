services:
  cashtrace-backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - cashtrace

  cashtrace-frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - cashtrace

  cashtrace-caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - cashtrace-backend
      - cashtrace-frontend
    networks:
      - cashtrace

networks:
  cashtrace:
    driver: bridge
